name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Configure Git defaults
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.23.0'
          cache: false

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Module tidy check
        run: go mod tidy -diff

      - name: Race tests
        run: go test -race ./... -count=1

      - name: Build CLI
        run: go build ./cmd/opentunnel

  build-artifacts:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            platform: linux-amd64
          - goos: linux
            goarch: arm64
            platform: linux-arm64
          - goos: darwin
            goarch: amd64
            platform: darwin-amd64
          - goos: darwin
            goarch: arm64
            platform: darwin-arm64
    steps:
      - name: Configure Git defaults
        run: git config --global init.defaultBranch main

      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up Go
        uses: actions/setup-go@v6.4.0
        with:
          go-version: '1.23.0'
          cache: false

      - name: Build artifact
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          mkdir -p dist
          version="$(cat VERSION)"
          go build -ldflags "-X opentunnel/internal/buildinfo.Version=${version}" -o "dist/opentunnel-${version}-${{ matrix.platform }}" ./cmd/opentunnel

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: opentunnel-${{ matrix.platform }}
          path: dist/opentunnel-*-${{ matrix.platform }}
