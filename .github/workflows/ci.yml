name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'
          cache: true

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Module tidy check
        run: go mod tidy -diff

      - name: Race tests
        run: go test -race ./... -count=1

      - name: Build CLI
        run: go build ./cmd/opentunnel
