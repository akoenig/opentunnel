name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'
          cache: true

      - name: Test
        run: go test ./... -count=1

      - name: Vet
        run: go vet ./...

      - name: Module tidy check
        run: go mod tidy -diff

      - name: Race tests
        run: go test -race ./... -count=1

      - name: Build CLI
        run: go build ./cmd/opentunnel

  build-artifacts:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            name: opentunnel-linux-amd64
          - goos: darwin
            goarch: arm64
            name: opentunnel-darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23.0'
          cache: true

      - name: Build artifact
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: go build -o dist/${{ matrix.name }} ./cmd/opentunnel

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: dist/${{ matrix.name }}
