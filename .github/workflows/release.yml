name: Release

on:
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

jobs:
  publish-container:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Read version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version="$(tr -d '[:space:]' < VERSION)"
          tag="${{ github.event.release.tag_name }}"
          prerelease="${{ github.event.release.prerelease }}"
          if [ "$prerelease" = "true" ]; then
            printf 'prereleases do not publish stable release images or move latest\n' >&2
            exit 1
          fi
          if [ "$version" = "dev" ]; then
            printf 'VERSION must not be dev for a release\n' >&2
            exit 1
          fi
          if [ "$tag" != "$version" ]; then
            printf 'release tag %s does not match VERSION %s\n' "$tag" "$version" >&2
            exit 1
          fi
          case "$version" in
            v*)
              printf 'release versions must not use a leading v: %s\n' "$version" >&2
              exit 1
              ;;
          esac
          if [[ ! "$version" =~ ^[A-Za-z0-9_][A-Za-z0-9_.-]{0,127}$ ]]; then
            printf 'VERSION must be a valid Docker tag: %s\n' "$version" >&2
            exit 1
          fi
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Set image name
        id: image
        shell: bash
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY,,}"
          printf 'name=%s\n' "$image" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GHCR
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: deploy/docker/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}
            ${{ steps.image.outputs.name }}:latest
