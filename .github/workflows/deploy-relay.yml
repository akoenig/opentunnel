name: Deploy Relay

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'deploy the relay, or destroy the Cloudflare deployment'
        required: true
        default: 'deploy'
        type: choice
        options:
          - deploy
          - destroy
      version:
        description: 'OpenTunnel image tag from GHCR (for example 0.1.2, or latest)'
        required: true
        default: 'latest'

concurrency:
  group: deploy-relay
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.3

      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: deploy/cloudflare/pnpm-lock.yaml

      - name: Install dependencies
        working-directory: deploy/cloudflare
        run: pnpm install --frozen-lockfile

      - name: Log in to GHCR
        if: inputs.action == 'deploy'
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pin the relay image version
        if: inputs.action == 'deploy'
        working-directory: deploy/cloudflare
        run: sed -i "s|^ARG OPENTUNNEL_VERSION=.*|ARG OPENTUNNEL_VERSION=${{ inputs.version }}|" Dockerfile

      - name: Deploy to Cloudflare Containers
        if: inputs.action == 'deploy'
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: deploy/cloudflare
          command: deploy

      - name: Destroy the Cloudflare deployment
        if: inputs.action == 'destroy'
        uses: cloudflare/wrangler-action@v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: deploy/cloudflare
          command: delete --name opentunnel-relay --force
