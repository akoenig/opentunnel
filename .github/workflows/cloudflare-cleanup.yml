name: Cloudflare Cleanup

on:
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-24.04
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Set up pnpm
        uses: pnpm/action-setup@v6.0.8
        with:
          version: 11

      - name: Set up Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - name: List and delete container applications
        run: |
          pnpm dlx wrangler@4.100.0 containers list | tee /tmp/containers.txt
          ids=$(grep -oE '[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}' /tmp/containers.txt | sort -u || true)
          for id in $ids; do
            echo "deleting container application $id"
            pnpm dlx wrangler@4.100.0 containers delete "$id" || true
          done

      - name: List and delete registry images
        run: |
          pnpm dlx wrangler@4.100.0 containers images list | tee /tmp/images.txt || true
          grep -oE '\S*opentunnel-relay\S*:\S+' /tmp/images.txt | sort -u | while read -r image; do
            echo "deleting image $image"
            pnpm dlx wrangler@4.100.0 containers images delete "$image" || true
          done
          echo "--- remaining:"
          pnpm dlx wrangler@4.100.0 containers list || true
          pnpm dlx wrangler@4.100.0 containers images list || true
